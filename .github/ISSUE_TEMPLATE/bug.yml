name: Bug
description: Report a defect with reproduction and containment details.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken and why does it matter?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include payloads, commands, or screenshots as needed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact, observability, and containment
      description: Note user impact, logs, auditability, and short-term mitigation.
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test plan
    validations:
      required: true
