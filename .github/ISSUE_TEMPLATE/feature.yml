name: Feature
about: Request a new feature implementation
labels: [feature]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature should be implemented?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List testable acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test Plan
      description: How will this be validated?
    validations:
      required: true
  - type: textarea
    id: telemetry
    attributes:
      label: Logging/Telemetry Impact
      description: What logs/metrics/audit fields change?
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout Risks
      description: Risks and rollback strategy.
    validations:
      required: true
